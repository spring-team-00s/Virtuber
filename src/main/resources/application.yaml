spring:
  application:
    name: Virtuber

  datasource:
    url: jdbc:mysql://localhost:3306/virtuber?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 11111111
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true