services:
  mysql:
    image: mysql:8.4
    container_name: virtuber-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 11111111
      MYSQL_DATABASE: virtuber
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - virtuber-mysql-data:/var/lib/mysql

volumes:
  virtuber-mysql-data: